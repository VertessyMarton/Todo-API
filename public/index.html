<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow background-glow-left"></div>
    <div class="background-glow background-glow-right"></div>

    <main class="shell">
      <section class="panel auth-panel" id="authPanel">
        <p class="eyebrow">Todo API Client</p>
        <h1>Todos</h1>
        <p class="subtitle">Sign in or create an account to manage your tasks.</p>

        <form id="authForm" class="form">
          <label>
            Username
            <input id="usernameInput" name="username" type="text" minlength="3" required />
          </label>
          <label>
            Password
            <input id="passwordInput" name="password" type="password" minlength="8" required />
          </label>
          <button type="submit" id="authSubmitBtn">Login</button>
        </form>

        <button id="authToggleBtn" class="link-button" type="button">
          Need an account? Register
        </button>
      </section>

      <section class="panel app-panel hidden" id="appPanel">
        <div class="app-header">
          <div>
            <p class="eyebrow">Workspace</p>
            <h2 id="welcomeText">Your Todos</h2>
          </div>
          <button id="logoutBtn" class="ghost-button" type="button">Log out</button>
        </div>

        <form id="todoForm" class="todo-form">
          <input id="taskInput" name="task" type="text" placeholder="Add a task" required />
          <button type="submit">Add</button>
        </form>

        <ul id="todoList" class="todo-list"></ul>
      </section>
    </main>

    <p id="statusMessage" class="status" aria-live="polite"></p>

    <script type="module" src="./app.js"></script>
  </body>
</html>
